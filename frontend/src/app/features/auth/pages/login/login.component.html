<div class="login-page">
  <h1>EducManager</h1>
  <h2>Connexion</h2>

  <form (ngSubmit)="onSubmit()">
    <div>
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" required />
    </div>
    <div>
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" name="password" required />
    </div>

    <p *ngIf="error" class="error">{{ error }}</p>

    <button type="submit">Se connecter</button>
  </form>

  <div class="hints">
    <p class="hints__title">Comptes de test :</p>
    <p class="hint">Admin : admin&#64;educmanager.fr / admin123</p>
    <p class="hint">Référente : referente&#64;educmanager.fr / referente123</p>
    <p class="hint">Formateur : formateur&#64;educmanager.fr / formateur123</p>
    <p class="hint">Étudiant : etudiant&#64;educmanager.fr / etudiant123</p>
  </div>
</div>
