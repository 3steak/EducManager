<section>
  <h1>Bienvenue sur EducManager</h1>
  <p>Application de gestion de formation.</p>

  <p *ngIf="loading">Chargement des cours...</p>
  <p *ngIf="error" class="error">{{ error }}</p>
  <p *ngIf="!loading && !error && courses.length === 0">Aucun cours pour le moment.</p>

  <ul *ngIf="!loading && !error && courses.length > 0">
    <li *ngFor="let course of courses">
      <strong>{{ course.code }}</strong> — {{ course.titre }}
    </li>
  </ul>
</section>
